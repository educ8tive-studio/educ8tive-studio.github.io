    <script>
        window.onload = function() {
            var timeLeft = 3; // Seconds to redirect
            var baseUrl = "https://www.teacherspayteachers.com/store/educ8tive-studio";
            var currentParams = window.location.search;
            
            // Default to github if no UTMs are present
            if (!currentParams || currentParams === "") {
                currentParams = "?utm_source=github";
            } else {
                currentParams = currentParams + "&utm_campaign=GithubWebsiteRedirect";
            }
            
            var finalUrl = baseUrl + currentParams;
            var timerDisplay = document.getElementById("timer");
            var manualLink = document.getElementById("manual-link");

            // Update the link for accessibility/fallback
            manualLink.href = finalUrl;

            // Countdown Logic
            var countdownInterval = setInterval(function() {
                timeLeft -= 1;
                timerDisplay.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    window.location.href = finalUrl;
                }
            }, 1000);
        };
    </script>
